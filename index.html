<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilgili İnşaat & Alüminyum</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Üst Menü */
        .header {
            display: flex;
            justify-content: flex-end;
            padding: 20px 40px;
        }

        .contact-btn {
            cursor: pointer;
            font-weight: 600;
            border: 1px solid #fff;
            padding: 8px 20px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: #fff;
            color: #000;
        }

        /* Ana Logo */
        .logo-section {
            display: flex;
            justify-content: center;
            padding: 50px 0;
        }

        .logo-container {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        .logo-container img {
            width: 280px;
            display: block;
        }

        /* Kart Menü Yapısı */
        .menu-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 40px;
            padding-bottom: 100px;
        }

        /* Görsel Kart Tasarımı */
        .card {
            position: relative;
            width: 320px;
            height: 200px;
            border: 4px solid #fff; /* Fotoğraftaki beyaz çerçeve */
            border-radius: 12px;
            overflow: visible; /* Etiketin dışarı taşması için */
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
        }

        /* Fotoğraftaki Beyaz Alt Etiket */
        .card-label {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #d32f2f; /* Kırmızımsı kurumsal renk */
            padding: 5px 35px;
            font-weight: 900;
            font-size: 18px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        /* Açılır Menü (Dropdown) */
        .dropdown-content {
            display: none;
            position: absolute;
            top: -130px; /* Kartın üstünde açılması için */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #444;
            min-width: 200px;
            border-radius: 10px;
            z-index: 100;
            padding: 10px 0;
        }

        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: 0.2s;
        }

        .dropdown-content a:hover {
            background: #d32f2f;
        }

        /* İletişim Paneli */
        #contactPanel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #fff;
            z-index: 1000;
            text-align: center;
        }

        @media (max-width: 768px) {
            .card { width: 280px; height: 180px; }
            .logo-container img { width: 200px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="contact-btn" onclick="toggleElement('contactPanel')">İLETİŞİM</div>
    </div>

    <div class="logo-section">
        <div class="logo-container">
            <img src="images/logo.png" alt="Bilgili Logo">
        </div>
    </div>

    <div class="menu-container">
        <div class="card" onclick="toggleElement('pvcMenu')">
            <img src="katolog.png" alt="PVC Sistemleri">
            <div class="card-label">PVC</div>
            <div id="pvcMenu" class="dropdown-content">
                <a href="https://tecnoplas.com.tr/tr/grosstec-serisi-tr" target="_blank">GrossTEC</a>
                <a href="https://tecnoplas.com.tr/tr/megatec-serisi-tr" target="_blank">MegaTEC</a>
                <a href="https://tecnoplas.com.tr/tr/supertec-serisi-tr" target="_blank">SuperTEC</a>
            </div>
        </div>

        <div class="card" onclick="toggleElement('aluMenu')">
            <img src="730040.jpeg" alt="Alüminyum Sistemleri">
            <div class="card-label">ALÜMİNYUM</div>
            <div id="aluMenu" class="dropdown-content">
                <a href="#">Alüminyum 1</a>
                <a href="#">Alüminyum 2</a>
                <a href="#">Profil Detayları</a>
            </div>
        </div>
    </div>

    <div id="contactPanel">
        <h2>İletişim Bilgileri</h2>
        <p>İskenderun Teknik Üniversitesi / Hatay</p>
        <p>Telefon: 05xx xxx xx xx</p>
        <button onclick="toggleElement('contactPanel')" style="margin-top:15px; padding:10px 20px; cursor:pointer;">Kapat</button>
    </div>

    <script>
        function toggleElement(id) {
            const el = document.getElementById(id);
            // Diğer açık olanları kapat (temiz görünüm için)
            if (el.style.display === "block") {
                el.style.display = "none";
            } else {
                // Hepsini kapat sonra tıkladığını aç
                document.querySelectorAll('.dropdown-content, #contactPanel').forEach(item => {
                    item.style.display = 'none';
                });
                el.style.display = "block";
            }
        }

        // Dışarı tıklandığında menüleri kapat
        window.onclick = function(event) {
            if (!event.target.closest('.card') && !event.target.closest('.contact-btn') && !event.target.closest('#contactPanel')) {
                document.querySelectorAll('.dropdown-content, #contactPanel').forEach(el => {
                    el.style.display = 'none';
                });
            }
        }
    </script>
</body>
</html>
