<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilgili</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

/* HEADER */
.header{
    display:flex;
    justify-content:flex-end;
    padding:25px 35px;
}

.contact-btn{
    cursor:pointer;
    font-weight:bold;
    font-size:18px;
    transition:.3s;
}
.contact-btn:hover{
    color:orange;
}

/* CENTER */
.center{
    display:flex;
    justify-content:center;
    align-items:center;
    height:60vh;
}

.logo img{
    width:320px;
    background:white;
    padding:25px;
    border-radius:14px;
    transition:.3s;
}
.logo img:hover{
    transform:scale(1.05);
}

/* MENU */
.menu{
    display:flex;
    justify-content:center;
    gap:100px;
    margin-bottom:100px;
    position:relative;
    flex-wrap:nowrap; /* mobilde de yan yana */
}

/* ITEM */
.menu-item{
    position:relative; /* liste bunun üstüne konacak */
    text-align:center;
}

.title{
    cursor:pointer;
    font-size:26px;
    font-weight:bold;
    transition:.3s;
}
.title:hover{
    color:orange;
}

/* LIST OVERLAY */
.list{
    display:none;
    position:absolute;
    bottom:40px; /* yukarı doğru açılsın */
    left:50%;
    transform:translateX(-50%);
    background:#111;
    padding:15px 20px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.6);
    min-width:220px;
    z-index:999;
}

.list a{
    display:block;
    color:white;
    text-decoration:none;
    margin:6px 0;
    font-size:16px;
    transition:.3s;
}
.list a:hover{
    color:orange;
}

/* CONTACT PANEL */
.contact-panel{
    display:none;
    position:fixed;
    top:70px;
    right:30px;
    width:360px;
    background:#111;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 20px rgba(0,0,0,.7);
    z-index:1000;
}

.contact-panel iframe{
    width:100%;
    height:220px;
    border:0;
    margin-top:10px;
    border-radius:6px;
}

/* MOBILE */
@media(max-width:768px){

    .logo img{
        width:200px;
    }

    .menu{
        gap:50px;
    }

    .title{
        font-size:20px;
    }

    .contact-panel{
        width:90%;
        right:5%;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="contact-btn" onclick="toggle('contactPanel')">
        İLETİŞİM
    </div>
</div>

<div class="center">
    <div class="logo">
        <img src="images/logo.png" alt="Bilgili Logo">
    </div>
</div>

<div class="menu">

    <div class="menu-item">
        <div class="title" onclick="toggle('pvcList')">PVC</div>
        <div class="list" id="pvcList">
            <a href="https://tecnoplas.com.tr/tr/grosstec-serisi-tr" target="_blank">GrossTEC</a>
            <a href="https://tecnoplas.com.tr/tr/megatec-serisi-tr" target="_blank">MegaTEC</a>
            <a href="https://tecnoplas.com.tr/tr/supertec-serisi-tr" target="_blank">SuperTEC</a>
        </div>
    </div>

    <div class="menu-item">
        <div class="title" onclick="toggle('aluList')">Alüminyum</div>
        <div class="list" id="aluList">
            <a href="#">Alüminyum 1</a>
            <a href="#">Alüminyum 2</a>
        </div>
    </div>

</div>

<div class="contact-panel" id="contactPanel">
    <h3>İletişim</h3>
    <p><b>Adres:</b><br>
    İskenderun Teknik Üniversitesi<br>
    Hatay</p>
    <p><b>Telefon:</b> 05xx xxx xx xx</p>
    <p><b>E-posta:</b> info@bilgili.com</p>
    <iframe src="https://www.google.com/maps?q=iskenderun+teknik+üniversitesi&output=embed"></iframe>
</div>

<script>
function toggle(id){
    const el = document.getElementById(id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
