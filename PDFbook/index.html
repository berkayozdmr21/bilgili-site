<!doctype html>
<html lang="en" class="no-js">
<head>
    <script>(function(H){H.className=H.className.replace(/\bno-js\b/,'js')})(document.documentElement)</script>
    <meta charset="utf-8">
    <style>
        .js #features {
            margin-left: -12000px; width: 100%;
        }
    </style>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title></title>
    <meta name="description" content="">
    <meta name="author" content="Marcio Aguiar">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/wow_book.css" type="text/css" />
    <link rel="stylesheet" type="text/css" href="css/preview.css">
    <link href='//fonts.googleapis.com/css?family=News+Cycle' rel='stylesheet' type='text/css'>

    <script src="js/modernizr-1.6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.min.js"></script>
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
    <script>!window.jQuery && document.write(unescape('%3Cscript src="./js/libs/jquery-1.9.1.min.js"%3E%3C/script%3E'))</script>
    <script type="text/javascript" src="wow_book.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/script.js"></script>
</head>
<body>
<script>
    const pdfUrl = 'TecnoplasNew.pdf';
</script>

<div id="loading" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999;">
    <div class="spinner"></div>
</div>

<style>
.spinner {
    border: 6px solid #f3f3f3;
    border-top: 6px solid #3498db;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
}
@keyframes spin {
    0% { transform: rotate(0deg);}
    100% { transform: rotate(360deg);}
}
</style>

<div id="container">
    <nav>
        <ul>
            <li><a id='first'       href="#" title='goto first page'    >First page</a></li>
            <li><a id='back'        href="#" title='go back one page'   >Back</a></li>
            <li><a id='next'        href="#" title='go foward one page'>Next</a></li>
            <li><a id='last'        href="#" title='goto last page'     >last page</a></li>
            <li><a id='zoomin'      href="#" title='zoom in'            >Zoom In</a></li>
            <li><a id='zoomout'     href="#" title='zoom out'           >Zoom Out</a></li>
            <li><a id='slideshow' href="#" title='start slideshow'   >Slide Show</a></li>
            <li><a id='flipsound' href="#" title='flip sound on/off' >Flip sound</a></li>
            <li><a id='fullscreen' href="#" title='fullscreen on/off' >Fullscreen</a></li>
            <li><a id='thumbs'      href="#" title='thumbnails on/off' >Thumbs</a></li>
        </ul>
    </nav>
    <div id="main">
        <div id='features'>
        </div>
    </div>

    <script>
        const features = document.getElementById('features');
        const canvasWidth = 1000;
        const canvasHeight = 1400;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.9.179/build/pdf.worker.min.js';

        async function renderPDF() {
            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            const pdf = await loadingTask.promise;

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);

                const viewport = page.getViewport({ scale: 1 });
                const originalWidth = viewport.width;
                const originalHeight = viewport.height;
                const scale = Math.min(canvasWidth / originalWidth, canvasHeight / originalHeight);
                const scaledViewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');

                canvas.width = canvasWidth;
                canvas.height = canvasHeight;

                const offsetX = (canvasWidth - scaledViewport.width) / 2;
                const offsetY = (canvasHeight - scaledViewport.height) / 2;

                context.save();
                context.translate(offsetX, offsetY);
                await page.render({ canvasContext: context, viewport: scaledViewport }).promise;
                context.restore();

                // Canvas içeriğini Base64 veri URL'sine dönüştür
                const imageDataUrl = canvas.toDataURL('image/png'); // veya 'image/jpeg'

                const resp_f = document.createElement('div');
                resp_f.className = 'responsive feature';

                // Yeni bir <img> etiketi oluştur ve Base64 verisini src olarak ata
                const img = document.createElement('img');
                img.src = imageDataUrl;
                img.style.width = '100%'; // img etiketinin div içinde tam genişlikte olmasını sağlar
                img.style.height = 'auto'; // Oranını korur

                resp_f.appendChild(img); // img etiketini ekle, canvas yerine
                features.appendChild(resp_f);
            }
        }


        renderPDF().then(() => {
            const loadingDiv = document.getElementById('loading');
            if (loadingDiv) loadingDiv.style.display = 'none';

            $('#features').wowBook({
                height : canvasHeight,
                width  : canvasWidth * 2,
                padding : 0,
                margin : 0,
                centeredWhenClosed : true,
                hardcovers : true,
                turnPageDuration : 1000,
                numberedPages : [0,-1],
                controls : {
                    zoomIn      : '#zoomin',
                    zoomOut     : '#zoomout',
                    next        : '#next',
                    back        : '#back',
                    first       : '#first',
                    last        : '#last',
                    slideShow   : '#slideshow',
                    flipSound   : '#flipsound',
                    thumbnails  : '#thumbs',
                    fullscreen  : '#fullscreen'
                },
                scaleToFit: "#container",
                thumbnailsPosition : 'bottom',
                onFullscreenError : function(){
                    var msg="Fullscreen failed.";
                    if (self!=top) msg="The frame is blocking full screen mode. Click on 'remove frame' button above and try to go full screen again."
                    alert(msg);
                }
            }).css({'display':'none', 'margin':'0'}).fadeIn(1000);
        });
    </script>


    <style>
        .wowbook-page-content{
            padding: 0 !important;
        }
    </style>
    <div id='thumbs_holder'></div>
</div>
</body>
</html>
